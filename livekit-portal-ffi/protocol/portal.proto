syntax = "proto3";

package livekit.portal.proto;

import "handle.proto";
import "types.proto";

// ---- Config builder ----

message NewPortalConfigRequest {
  string session = 1;
  Role role = 2;
}
message NewPortalConfigResponse {
  FfiOwnedHandle handle = 1;
}

message ConfigAddVideoRequest {
  uint64 config_handle = 1;
  string name = 2;
}
message ConfigAddVideoResponse {}

message ConfigAddStateRequest {
  uint64 config_handle = 1;
  repeated string fields = 2;
}
message ConfigAddStateResponse {}

message ConfigAddActionRequest {
  uint64 config_handle = 1;
  repeated string fields = 2;
}
message ConfigAddActionResponse {}

message ConfigSetFpsRequest {
  uint64 config_handle = 1;
  uint32 fps = 2;
}
message ConfigSetFpsResponse {}

message ConfigSetSlackRequest {
  uint64 config_handle = 1;
  uint32 ticks = 2;
}
message ConfigSetSlackResponse {}

message ConfigSetToleranceRequest {
  uint64 config_handle = 1;
  float ticks = 2;
}
message ConfigSetToleranceResponse {}

message ConfigSetStateReliableRequest {
  uint64 config_handle = 1;
  bool reliable = 2;
}
message ConfigSetStateReliableResponse {}

message ConfigSetActionReliableRequest {
  uint64 config_handle = 1;
  bool reliable = 2;
}
message ConfigSetActionReliableResponse {}

message ConfigSetPingMsRequest {
  uint64 config_handle = 1;
  uint64 ms = 2;
}
message ConfigSetPingMsResponse {}

// ---- Portal lifecycle ----

message NewPortalRequest {
  uint64 config_handle = 1;
}
message NewPortalResponse {
  FfiOwnedHandle handle = 1;
  // Echo of the declared field/track order. lets clients decode subsequent
  // push events (ActionEvent, StateEvent, DropEvent, ObservationEvent) without
  // round-tripping through the config.
  repeated string state_fields = 2;
  repeated string action_fields = 3;
  repeated string video_tracks = 4;
}

message ConnectRequest {
  uint64 portal_handle = 1;
  string url = 2;
  string token = 3;
}
// Async: ConnectCallback (carrying async_id) is emitted when the connect
// completes. The sync response below carries the same async_id.
message ConnectResponse {
  uint64 async_id = 1;
}
message ConnectCallback {
  uint64 async_id = 1;
  optional FfiError error = 2;
}

message DisconnectRequest {
  uint64 portal_handle = 1;
}
message DisconnectResponse {
  uint64 async_id = 1;
}
message DisconnectCallback {
  uint64 async_id = 1;
  optional FfiError error = 2;
}

// ---- Send API (sync) ----

message SendVideoFrameRequest {
  uint64 portal_handle = 1;
  string track_name = 2;
  bytes rgb_data = 3;           // W*H*3 packed RGB24
  uint32 width = 4;
  uint32 height = 5;
  optional uint64 timestamp_us = 6;
}
message SendVideoFrameResponse {
  optional FfiError error = 1;
}

message SendStateRequest {
  uint64 portal_handle = 1;
  map<string, double> values = 2;
  optional uint64 timestamp_us = 3;
}
message SendStateResponse {
  optional FfiError error = 1;
}

message SendActionRequest {
  uint64 portal_handle = 1;
  map<string, double> values = 2;
  optional uint64 timestamp_us = 3;
}
message SendActionResponse {
  optional FfiError error = 1;
}

// ---- Pull API (sync) ----

message GetObservationRequest {
  uint64 portal_handle = 1;
}
message GetObservationResponse {
  optional Observation observation = 1;
}

message GetActionRequest {
  uint64 portal_handle = 1;
}
message GetActionResponse {
  map<string, double> values = 1;
  bool present = 2;
}

message GetStateRequest {
  uint64 portal_handle = 1;
}
message GetStateResponse {
  map<string, double> values = 1;
  bool present = 2;
}

message GetVideoFrameRequest {
  uint64 portal_handle = 1;
  string track_name = 2;
}
message GetVideoFrameResponse {
  optional VideoFrameData frame = 1;
}

// ---- Metrics ----

message MetricsRequest {
  uint64 portal_handle = 1;
}
message MetricsResponse {
  PortalMetrics metrics = 1;
}

message ResetMetricsRequest {
  uint64 portal_handle = 1;
}
message ResetMetricsResponse {}

// ---- Push events (always emitted; Python-side filters by portal_handle) ----

message ActionEvent {
  uint64 portal_handle = 1;
  map<string, double> values = 2;
}

message ObservationEvent {
  uint64 portal_handle = 1;
  Observation observation = 2;
}

message StateEvent {
  uint64 portal_handle = 1;
  map<string, double> values = 2;
}

message VideoFrameEvent {
  uint64 portal_handle = 1;
  string track_name = 2;
  VideoFrameData frame = 3;
}

message DropEvent {
  uint64 portal_handle = 1;
  repeated DroppedState dropped = 2;
}
message DroppedState {
  map<string, double> values = 1;
}

// ---- Handle disposal ----

message DisposeHandleRequest {
  uint64 handle = 1;
}
message DisposeHandleResponse {
  bool existed = 1;
}
