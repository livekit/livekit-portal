syntax = "proto3";

package livekit.portal.proto;

import "portal.proto";

// All requests from Python → Rust.
message FfiRequest {
  oneof message {
    // Config builder
    NewPortalConfigRequest new_config = 1;
    ConfigAddVideoRequest config_add_video = 2;
    ConfigAddStateRequest config_add_state = 3;
    ConfigAddActionRequest config_add_action = 4;
    ConfigSetFpsRequest config_set_fps = 5;
    ConfigSetSlackRequest config_set_slack = 6;
    ConfigSetToleranceRequest config_set_tolerance = 7;
    ConfigSetStateReliableRequest config_set_state_reliable = 8;
    ConfigSetActionReliableRequest config_set_action_reliable = 9;
    ConfigSetPingMsRequest config_set_ping_ms = 10;

    // Portal lifecycle + I/O
    NewPortalRequest new_portal = 20;
    ConnectRequest connect = 21;
    DisconnectRequest disconnect = 22;
    SendVideoFrameRequest send_video_frame = 23;
    SendStateRequest send_state = 24;
    SendActionRequest send_action = 25;
    GetObservationRequest get_observation = 26;
    GetActionRequest get_action = 27;
    GetStateRequest get_state = 28;
    GetVideoFrameRequest get_video_frame = 29;
    MetricsRequest metrics = 30;
    ResetMetricsRequest reset_metrics = 31;

    // Handle management
    DisposeHandleRequest dispose_handle = 90;
  }
}

// All responses from Rust → Python.
message FfiResponse {
  oneof message {
    NewPortalConfigResponse new_config = 1;
    ConfigAddVideoResponse config_add_video = 2;
    ConfigAddStateResponse config_add_state = 3;
    ConfigAddActionResponse config_add_action = 4;
    ConfigSetFpsResponse config_set_fps = 5;
    ConfigSetSlackResponse config_set_slack = 6;
    ConfigSetToleranceResponse config_set_tolerance = 7;
    ConfigSetStateReliableResponse config_set_state_reliable = 8;
    ConfigSetActionReliableResponse config_set_action_reliable = 9;
    ConfigSetPingMsResponse config_set_ping_ms = 10;

    NewPortalResponse new_portal = 20;
    ConnectResponse connect = 21;
    DisconnectResponse disconnect = 22;
    SendVideoFrameResponse send_video_frame = 23;
    SendStateResponse send_state = 24;
    SendActionResponse send_action = 25;
    GetObservationResponse get_observation = 26;
    GetActionResponse get_action = 27;
    GetStateResponse get_state = 28;
    GetVideoFrameResponse get_video_frame = 29;
    MetricsResponse metrics = 30;
    ResetMetricsResponse reset_metrics = 31;

    DisposeHandleResponse dispose_handle = 90;
  }
}

// All async events from Rust → Python, delivered via the registered callback.
message FfiEvent {
  oneof message {
    ConnectCallback connect = 1;
    DisconnectCallback disconnect = 2;
    ActionEvent action = 3;
    ObservationEvent observation = 4;
    StateEvent state = 5;
    VideoFrameEvent video_frame = 6;
    DropEvent drop = 7;
  }
}
