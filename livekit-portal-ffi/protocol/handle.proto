syntax = "proto3";

package livekit.portal.proto;

// A handle to a Rust-side object (PortalConfig, Portal, response buffer).
// Ownership rules:
//   - Response buffers: returned by livekit_portal_ffi_request(); caller
//     must free with livekit_portal_ffi_drop_handle() after copying the bytes.
//   - Domain objects (PortalConfig, Portal): freed by sending a
//     DisposeHandleRequest. Do NOT drop these via _drop_handle(), which only
//     frees response buffers.
message FfiOwnedHandle {
  uint64 id = 1;
}
