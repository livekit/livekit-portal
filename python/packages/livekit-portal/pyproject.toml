[build-system]
requires = ["hatchling>=1.20", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "livekit-portal"
dynamic = ["version"]
description = "Python bindings for livekit-portal. robot ↔ operator sync over LiveKit"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
    "numpy>=1.24",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]
examples = [
    "livekit-api>=0.7",
    "python-dotenv>=1",
]
integration = [
    "livekit-api>=0.7",
]

[tool.pytest.ini_options]
# `asyncio_mode = "auto"` lets async test functions run without a
# per-test `@pytest.mark.asyncio`. We still mark the integration module
# (pytestmark) for clarity. `testpaths` keeps `pytest` from descending
# into example directories at repo root.
asyncio_mode = "auto"
testpaths = ["tests"]

# The Rust cdylib and generated UniFFI module are built out-of-band via
# the repo-root `scripts/build_ffi_python.sh` and dropped into
# `livekit/portal/`. Both must live next to each other for UniFFI's
# runtime CDLL lookup to resolve.

# PEP 420 implicit namespace package: `livekit` has no __init__.py so it can
# coexist with livekit-api (`livekit.api`), livekit-protocol (`livekit.protocol`),
# etc. Listing `livekit` as the package keeps hatchling's editable .pth pointed
# at the package root so `from livekit.portal import ...` resolves.
[tool.hatch.build.hooks.custom]

[tool.hatch.build.targets.wheel]
packages = ["livekit"]
artifacts = [
    "livekit/portal/liblivekit_portal_ffi.dylib",
    "livekit/portal/liblivekit_portal_ffi.so",
    "livekit/portal/livekit_portal_ffi.py",
]

[tool.hatch.build]
exclude = ["tests", "examples", ".venv", ".pytest_cache"]

[tool.hatch.version]
source = "vcs"
tag-pattern = "^v(?P<version>.+)$"
raw-options = { search_parent_directories = true }
