[build-system]
requires = ["hatchling>=1.20"]
build-backend = "hatchling.build"

[project]
name = "livekit-portal"
version = "0.1.0"
description = "Python bindings for livekit-portal. robot ↔ operator sync over LiveKit"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
    "numpy>=1.24",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
]
examples = [
    "livekit-api>=0.7",
    "python-dotenv>=1",
]

# The Rust cdylib and generated UniFFI module are built out-of-band via
# `scripts/build_native.sh` and dropped into `livekit/portal/`. Both must
# live next to each other for UniFFI's runtime CDLL lookup to resolve.

# PEP 420 implicit namespace package: `livekit` has no __init__.py so it can
# coexist with livekit-api (`livekit.api`), livekit-protocol (`livekit.protocol`),
# etc. Listing `livekit` as the package keeps hatchling's editable .pth pointed
# at the package root so `from livekit.portal import ...` resolves.
[tool.hatch.build.targets.wheel]
packages = ["livekit"]
artifacts = [
    "livekit/portal/liblivekit_portal_ffi.dylib",
    "livekit/portal/liblivekit_portal_ffi.so",
    "livekit/portal/livekit_portal_ffi.dll",
    "livekit/portal/livekit_portal_ffi.py",
]

[tool.hatch.build]
exclude = ["tests", "examples", ".venv", ".pytest_cache"]
